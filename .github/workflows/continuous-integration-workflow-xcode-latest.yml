name: Build
on: [push, pull_request]

jobs:
  build:
    name: Build and Test with Latest Xcode
    runs-on: macOS-13
    # env:
    #   DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "^15.1.0"
      - name: Build McBopomofoInstaller
        run: xcodebuild -scheme McBopomofoInstaller -configuration Release -derivedDataPath output build
      - name: Upload McBopomofoInstaller
        uses: actions/upload-artifact@v4
        with:
          name: McBopomofo-Installer
          path: output/Build/Products/Release/*
          retention-days: 30
